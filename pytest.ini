[pytest]
# Silence known third-party deprecation noise so the suite output is readable.
# These come from inside skimage, imageio/tifffile, cellpose and PyTorch — not
# from this project's code. Each filter targets a specific upstream message, so
# a warning raised by our own code would still surface. Regenerate the message
# list if a dependency changes what it emits.
filterwarnings =
    ignore:Setting the shape on a NumPy array has been deprecated:DeprecationWarning
    ignore:.*are stored as RGB with separate component planes.*:DeprecationWarning
    ignore:Sparse invariant checks are implicitly disabled:UserWarning
